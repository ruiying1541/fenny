<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rylee - 归档</title>
  <link rel="stylesheet" href="./assets/style.css">
  <meta name="theme-color" content="#0a0a0b">
</head>
<body>
  <nav class="nav">
    <a href="./" class="nav-brand">
      <img src="./assets/logo.png" alt="Rylee" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="logo-fallback" style="display:none"></span>
      <span>Rylee</span>
    </a>
    <div class="nav-links">
      <a href="./">首页</a>
      <a href="./archive.html" class="active">归档</a>
    </div>
  </nav>

  <main class="container">
    <header class="archive-header">
      <h1>归档</h1>
      <p>所有期数，按时间倒序排列</p>
    </header>

    <div id="archive-list">
      <p style="text-align:center; color:var(--text-tertiary); padding:var(--s8);">加载中...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-row">
      <span class="footer-brand">Rylee</span>
      <span class="footer-text">Powered by CodeFlicker</span>
    </div>
  </footer>

  <script>
    fetch('./index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = document.getElementById('archive-list');
        if (!data.issues || data.issues.length === 0) {
          list.innerHTML = '<p style="text-align:center; color:var(--text-tertiary); padding:var(--s8);">暂无期数</p>';
          return;
        }
        list.innerHTML = data.issues.map(function(issue) {
          return '<a href="' + issue.url + '" class="archive-item">' +
            '<span class="archive-number">#' + issue.issue_number + '</span>' +
            '<span class="archive-date">' + issue.date + '</span>' +
            '<span class="archive-title">' + issue.title + '</span>' +
          '</a>';
        }).join('');
      })
      .catch(function() {
        document.getElementById('archive-list').innerHTML =
          '<p style="text-align:center; color:var(--accent);">加载归档失败</p>';
      });
  </script>
</body>
</html>
