<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fenny - Archive</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">Fenny</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/archive.html" class="active">Archive</a>
    </div>
  </nav>

  <main class="container">
    <header class="archive-header">
      <h1>Archive</h1>
      <p>All issues, in reverse chronological order.</p>
    </header>

    <div id="archive-list">
      <p style="text-align:center; color:var(--color-text-tertiary); padding:var(--space-32);">Loading...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-row">
      <span class="footer-brand">Fenny</span>
      <span class="footer-text">Powered by CodeFlicker</span>
    </div>
  </footer>

  <script>
    fetch('/index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = document.getElementById('archive-list');
        if (!data.issues || data.issues.length === 0) {
          list.innerHTML = '<p style="text-align:center; color:var(--color-text-tertiary); padding:var(--space-32);">No issues yet.</p>';
          return;
        }
        list.innerHTML = data.issues.map(function(issue) {
          return '<a href="' + issue.url + '" class="archive-item">' +
            '<span class="archive-number">#' + issue.issue_number + '</span>' +
            '<span class="archive-date">' + issue.date + '</span>' +
            '<span class="archive-title">' + issue.title + '</span>' +
          '</a>';
        }).join('');
      })
      .catch(function() {
        document.getElementById('archive-list').innerHTML =
          '<p style="text-align:center; color:var(--color-accent);">Failed to load archive.</p>';
      });
  </script>
</body>
</html>
